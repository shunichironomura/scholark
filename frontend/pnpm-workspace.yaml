ignoredBuiltDependencies:
  - "@tailwindcss/oxide"
  - esbuild
minimumReleaseAge: 10080 # 7 days
# Workaround: pnpm does not fall back to older mature versions within a semver range
# for optional dependencies (platform-specific native binaries). Without these exclusions,
# installation fails when the latest version of these packages is newer than minimumReleaseAge.
# Related: https://github.com/pnpm/pnpm/issues/10270
minimumReleaseAgeExclude:
  - "@rollup/rollup-*"
  - "@napi-rs/wasm-runtime"
  - vite-plus
  - "@voidzero-dev/*"
  - oxlint
  - "@oxlint/*"
  - oxlint-tsgolint
  - "@oxlint-tsgolint/*"
  - oxfmt
  - "@oxfmt/*"
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
